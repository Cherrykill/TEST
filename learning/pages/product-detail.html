<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <!-- //ANCHOR: HEADER -->
    <header>
      <h1>🛒 E-commerce</h1>
      <nav>
        <a href="/">Trang chủ</a>
        <a href="product-detail.html">Sản phẩm</a>
        <a href="cart.html">Giỏ hàng</a>
        <a href="#">Liên hệ</a>
      </nav>

    <!-- //ANCHOR: DANH SÁCH SẢN PHẨM -->
    <section>
      <h2>Chi tiết sản phẩm</h2>
      <div class="product-detail">
        <img
          src="https://picsum.photos/400/400?random=1"
          alt="áo thun"
          style="width: 300px; border-radius: 8px"
        />
        <h3>Áo thun nam Basic</h3>
        <p style="font-size: 24px; color: #e67e22">199.000₫</p>
        <p>
          Mô tả: Chất liệu cotton 100%, thoáng mát, thích hợp mặc hàng ngày.
        </p>
        <button
          style="
          border: none;
            background: #e4e0e0;
            padding: 10px 30px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
          "
        >
          <a href="/" style="text-decoration: none; color: #000000;">Quay lại</a>
        </button>
        <button
          style="
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
          "
        >
          Thêm vào giỏ
        </button>
      </div>
    </section>

    <!-- //ANCHOR: FOOTER -->
    <footer>
