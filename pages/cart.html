<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <!-- //ANCHOR: HEADER -->
    <header>
      <h1>🛒 E-commerce</h1>
      <nav>
        <a href="../index.html">Trang chủ</a>
        <a href="product-detail.html">Sản phẩm</a>
        <a href="cart.html">Giỏ hàng</a>
        <a href="#">Liên hệ</a>
      </nav>
    </header>

    <!-- //ANCHOR: DANH SÁCH SẢN PHẨM -->
    <section>
      <h2>Giỏ hàng của bạn</h2>
      <table border="1" cellpadding="10" class="cart-table">
        <thead>
          <tr style="background-color: #fefefe">
            <th>Sản phẩm</th>
            <th>Số lượng</th>
            <th>Đơn giá</th>
            <th>Thành tiền</th>
            <th>Thao tác</th>
          </tr>
        </thead>
        <tbody>
          <!-- Noi dung se duoc JS tao dong o day  -->
        </tbody>
        <tfoot>
          <tr class="cart-total">
            <td colspan="4" style="text-align: right; font-weight: bold">
              Tổng cộng
            </td>
            <td id="totalAmount" style="text-align: center; font-weight: bold"></td>
          </tr>
        </tfoot>
      </table>
      <div class="cart-actions">
        <button class="btn-secondary" onclick="clearCart()">
          Xoá giỏ hàng
        </button>
        <button class="btn-primary">Tiến hành thanh toán</button>
      </div>
    </section>

    <!-- //ANCHOR: FOOTER -->
    <footer>
      <p>&copy; 2026 E-commerce. All rights reserved.</p>
    </footer>
    <script src="../js/script.js"></script>
  </body>
</html>
